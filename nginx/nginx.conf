events {
  worker_connections 1024;
}

http {

  upstream auth        { server auth:5001; }
  upstream assessment  { server assessment:5002; }
  upstream course      { server course:5003; }
  upstream enrollment  { server enrollment:5004; }
  upstream forum       { server forum:5005; }
  upstream lesson      { server lesson:5006; }
  upstream notification{ server notification:5007; }
  upstream payment     { server payment:5008; }
  upstream progress    { server progress:5009; }

  server {
    listen 80;

    # ─── API ROUTES ─────────────────────────────────────────

    location /api/auth/ {
      proxy_pass http://auth/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/assessment/ {
      proxy_pass http://assessment/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/courses/ {
      proxy_pass http://course/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/enrollments/ {
      proxy_pass http://enrollment/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/forum/ {
      proxy_pass http://forum/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/lessons/ {
      proxy_pass http://lesson/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/notifications/ {
      proxy_pass http://notification/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/payments/ {
      proxy_pass http://payment/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/progress/ {
      proxy_pass http://progress/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    # ─── FRONTEND ───────────────────────────────────────────

    location / {
      proxy_pass http://frontend:4200;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;

      # required for Angular hot-reload (WebSocket)
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
    }
  }
}