version: "3.8"

x-common-env: &common-env
  ASPNETCORE_ENVIRONMENT: Production
  ASPNETCORE_URLS: http://+:80
  AWS__Region: ap-southeast-2
  Auth__JwksUri: http://auth/auth/.well-known/jwks.json

services:

  # ── Nginx Reverse Proxy + Angular SPA ───────────────────────────
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.prod.conf:/etc/nginx/nginx.conf:ro
      - ./dist:/usr/share/nginx/html:ro
    depends_on:
      - auth
      - course
      - lesson
      - enrollment
      - payment
      - assessment
      - progress
      - forum
      - notification
    restart: no
    mem_limit: 64m

  # ── Auth Service ─────────────────────────────────────────────────
  auth:
    image: 358454003819.dkr.ecr.ap-southeast-2.amazonaws.com/dotlearn-auth:latest

    environment:
      <<: *common-env
      ConnectionStrings__DefaultConnection: "Server=dotlearn-db.c7ge68ueyfep.ap-southeast-2.rds.amazonaws.com,1433;Database=UserDb;User Id=admin;Password=DOTLearn@123;TrustServerCertificate=True;ConnectionTimeout=30;"
      Jwt__Issuer: dotlearn-auth
      Jwt__Audience: dotlearn-api
      AllowedOrigins__Ec2: "http://3.27.174.183"
      AllowedOrigins__CloudFront: ""
    restart: no

  # ── Course Service ────────────────────────────────────────────────
  course:
    image: 358454003819.dkr.ecr.ap-southeast-2.amazonaws.com/dotlearn-course:latest

    environment:
      <<: *common-env
      ConnectionStrings__DefaultConnection: "Server=dotlearn-db.c7ge68ueyfep.ap-southeast-2.rds.amazonaws.com,1433;Database=CourseDb;User Id=admin;Password=DOTLearn@123;TrustServerCertificate=True;ConnectionTimeout=30;"
      AllowedOrigins__Ec2: "http://3.27.174.183"
      AllowedOrigins__CloudFront: ""
    restart: no

  # ── Lesson Service ────────────────────────────────────────────────
