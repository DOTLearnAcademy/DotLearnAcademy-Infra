events {
  worker_connections 1024;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;
  sendfile on;

  # Gzip compression
  gzip on;
  gzip_types text/plain text/css application/javascript application/json application/x-javascript text/xml application/xml application/xml+rss text/javascript;
  gzip_min_length 1024;

  # Docker internal DNS resolver
  resolver 127.0.0.11 valid=10s ipv6=off;
  resolver_timeout 5s;

  # Shared proxy headers
  proxy_set_header Host $host;
  proxy_set_header X-Real-IP $remote_addr;
  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  proxy_set_header X-Forwarded-Proto $scheme;
  proxy_read_timeout 60s;
  proxy_connect_timeout 10s;

  server {
    listen 80;
    server_name _;

    # в”Ђв”Ђ Auth Service в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
    location /api/auth/ {
      set $auth_backend "http://auth:80";
      proxy_pass $auth_backend$request_uri;
    }

    location /auth/.well-known/ {
      set $auth_backend "http://auth:80";
      proxy_pass $auth_backend$request_uri;
    }

    location /api/users/ {
      set $auth_backend "http://auth:80";
      proxy_pass $auth_backend$request_uri;
    }

    location /api/admin/users/ {
      set $auth_backend "http://auth:80";
      proxy_pass $auth_backend$request_uri;
    }

    location /api/admin/courses/ {
      set $course_backend "http://course:80";
      proxy_pass $course_backend$request_uri;
    }

    # в”Ђв”Ђ Course Service в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
    # Handle both `/api/courses` and `/api/courses/` (avoid SPA try_files 301 redirect)
    location = /api/courses {
      set $course_backend "http://course:80";
      proxy_pass $course_backend$request_uri;
    }

    location /api/courses/ {
      set $course_backend "http://course:80";
      proxy_pass $course_backend$request_uri;
    }

    location /internal/courses/ {
      set $course_backend "http://course:80";
      proxy_pass $course_backend$request_uri;
    }

    # в”Ђв”Ђ Lesson Service в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
    location /api/lessons/ {
      set $lesson_backend "http://lesson:80";
      proxy_pass $lesson_backend$request_uri;
    }

    location /internal/lessons/ {
      set $lesson_backend "http://lesson:80";
      proxy_pass $lesson_backend$request_uri;
    }

    # в”Ђв”Ђ Enrollment Service в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
    location /api/enrollments/ {
      set $enrollment_backend "http://enrollment:80";
      proxy_pass $enrollment_backend$request_uri;
    }

    location /internal/enrollments/ {
      set $enrollment_backend "http://enrollment:80";
      proxy_pass $enrollment_backend$request_uri;
    }

    # в”Ђв”Ђ Payment Service в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
    location /api/payments/ {
      set $payment_backend "http://payment:80";
      proxy_pass $payment_backend$request_uri;
    }

    # в”Ђв”Ђ Assessment + Quiz Attempts в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
    location /api/quizzes/ {
      set $assessment_backend "http://assessment:80";
      proxy_pass $assessment_backend$request_uri;
    }

    location /api/attempts/ {
      set $assessment_backend "http://assessment:80";
      proxy_pass $assessment_backend$request_uri;
    }

    # в”Ђв”Ђ Progress + Certificates в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
    location /api/progress/ {
      set $progress_backend "http://progress:80";
      proxy_pass $progress_backend$request_uri;
    }

    location /api/certificates/ {
      set $progress_backend "http://progress:80";
      proxy_pass $progress_backend$request_uri;
    }

    # в”Ђв”Ђ Health Checks в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
    location /health/auth {
      set $auth_backend "http://auth:80";
      proxy_pass $auth_backend/health;
    }

    location /health/course {
      set $course_backend "http://course:80";
      proxy_pass $course_backend/health;
    }

    location /health/lesson {
      set $lesson_backend "http://lesson:80";
      proxy_pass $lesson_backend/health;
    }

    location /health/enrollment {
      set $enrollment_backend "http://enrollment:80";
      proxy_pass $enrollment_backend/health;
    }

    location /health/payment {
      set $payment_backend "http://payment:80";
      proxy_pass $payment_backend/health;
    }

    location /health/assessment {
      set $assessment_backend "http://assessment:80";
      proxy_pass $assessment_backend/health;
    }

    location /health/progress {
      set $progress_backend "http://progress:80";
      proxy_pass $progress_backend/health;
    }

    # в”Ђв”Ђ Angular SPA вЂ” MUST BE LAST в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
    location / {
      root /usr/share/nginx/html;
      index index.html;
      try_files $uri $uri/ /index.html;
    }
  }
}
