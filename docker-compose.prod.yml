
x-common-env: &common-env
  ASPNETCORE_ENVIRONMENT: Production
  ASPNETCORE_URLS: http://+:80
  AWS__Region: ap-southeast-2
  Auth__JwksUri: http://auth/auth/.well-known/jwks.json

services:

  # ── Nginx Reverse Proxy + Angular SPA ───────────────────────────
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.prod.conf:/etc/nginx/nginx.conf:ro
      - ./dist:/usr/share/nginx/html:ro
    depends_on:
      - auth
      - course
      - lesson
      - enrollment
      - payment
      - assessment
      - progress
    restart: no
    mem_limit: 64m

  # ── Auth Service ─────────────────────────────────────────────────
  auth:
    image: dotlearn-auth:v8b

    environment:
      <<: *common-env
      ConnectionStrings__DefaultConnection: "Server=dotlearn-db.c7ge68ueyfep.ap-southeast-2.rds.amazonaws.com,1433;Database=UserDb;User Id=admin;Password=DOTLearn123!;TrustServerCertificate=True;Connection Timeout=30;"
      Jwt__Issuer: dotlearn-auth
      Jwt__Audience: dotlearn-api
      AllowedOrigins__Ec2: "http://3.27.174.183,http://3.27.174.183.nip.io"
      AllowedOrigins__CloudFront: ""
      Jwt__PrivateKeyPath: "/app/keys/private.pem"
      GoogleAuth__ClientId: "452138609086-7kru8489914ajokpt41duoivo53m0k53.apps.googleusercontent.com"
    volumes:
      - ./keys/private.pem:/app/keys/private.pem:ro
    restart: no

  # ── Course Service ────────────────────────────────────────────────
  course:
    image: dotlearn-course:v9b

    environment:
      <<: *common-env
      ConnectionStrings__DefaultConnection: "Server=dotlearn-db.c7ge68ueyfep.ap-southeast-2.rds.amazonaws.com,1433;Database=CourseDb;User Id=admin;Password=DOTLearn123!;TrustServerCertificate=True;Connection Timeout=30;"
      AllowedOrigins__Ec2: "http://3.27.174.183,http://3.27.174.183.nip.io"
      AllowedOrigins__CloudFront: ""
    restart: no

  # ── Lesson Service ────────────────────────────────────────────────
  lesson:
    image: dotlearn-lesson:v3

    environment:
      <<: *common-env
      ConnectionStrings__DefaultConnection: "Server=dotlearn-db.c7ge68ueyfep.ap-southeast-2.rds.amazonaws.com,1433;Database=ContentDb;User Id=admin;Password=DOTLearn123!;TrustServerCertificate=True;Connection Timeout=30;"
      AllowedOrigins__Ec2: "http://3.27.174.183,http://3.27.174.183.nip.io"
      AllowedOrigins__CloudFront: ""
    restart: no

  # ── Enrollment Service ────────────────────────────────────────────
  enrollment:
    image: dotlearn-enrollment:v9b

    environment:
      <<: *common-env
      ConnectionStrings__DefaultConnection: "Server=dotlearn-db.c7ge68ueyfep.ap-southeast-2.rds.amazonaws.com,1433;Database=EnrollmentDb;User Id=admin;Password=DOTLearn123!;TrustServerCertificate=True;Connection Timeout=30;"
      SQS__EnrollmentPaymentSucceededQueue: "https://sqs.ap-southeast-2.amazonaws.com/358454003819/dotlearn-enrollment-payment-succeeded-dev"
      SQS__EnrollmentCompletedQueue: "https://sqs.ap-southeast-2.amazonaws.com/358454003819/dotlearn-enrollment-completed-dev"
      Services__CourseServiceUrl: "http://course"
      AllowedOrigins__Ec2: "http://3.27.174.183,http://3.27.174.183.nip.io"
      AllowedOrigins__CloudFront: ""
    restart: no

  # ── Payment Service ───────────────────────────────────────────────
