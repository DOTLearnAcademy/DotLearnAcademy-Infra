version: '3.8'

services:

  # ─── SQL SERVER DATABASES ───────────────────────────────────────

  sqlserver-auth:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      SA_PASSWORD: "DOTLearn@123"
      ACCEPT_EULA: "Y"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver-auth-data:/var/opt/mssql

  sqlserver-course:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      SA_PASSWORD: "DOTLearn@123"
      ACCEPT_EULA: "Y"
    ports:
      - "1434:1433"
    volumes:
      - sqlserver-course-data:/var/opt/mssql

  sqlserver-lesson:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      SA_PASSWORD: "DOTLearn@123"
      ACCEPT_EULA: "Y"
    ports:
      - "1435:1433"
    volumes:
      - sqlserver-lesson-data:/var/opt/mssql

  sqlserver-enrollment:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      SA_PASSWORD: "DOTLearn@123"
      ACCEPT_EULA: "Y"
    ports:
      - "1436:1433"
    volumes:
      - sqlserver-enrollment-data:/var/opt/mssql

  sqlserver-assessment:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      SA_PASSWORD: "DOTLearn@123"
      ACCEPT_EULA: "Y"
    ports:
      - "1437:1433"
    volumes:
      - sqlserver-assessment-data:/var/opt/mssql

  sqlserver-payment:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      SA_PASSWORD: "DOTLearn@123"
      ACCEPT_EULA: "Y"
    ports:
      - "1438:1433"
    volumes:
      - sqlserver-payment-data:/var/opt/mssql

  sqlserver-progress:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      SA_PASSWORD: "DOTLearn@123"
      ACCEPT_EULA: "Y"
    ports:
      - "1439:1433"
    volumes:
      - sqlserver-progress-data:/var/opt/mssql

  sqlserver-forum:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      SA_PASSWORD: "DOTLearn@123"
      ACCEPT_EULA: "Y"
    ports:
      - "1440:1433"
    volumes:
      - sqlserver-forum-data:/var/opt/mssql

  sqlserver-notification:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      SA_PASSWORD: "DOTLearn@123"
      ACCEPT_EULA: "Y"
    ports:
      - "1441:1433"
    volumes:
      - sqlserver-notification-data:/var/opt/mssql

  # ─── LOCALSTACK (simulates AWS) ─────────────────────────────────

  localstack:
    image: localstack/localstack:latest
    ports:
      - "4566:4566"
    environment:
      - SERVICES=sqs,sns,s3,secretsmanager
      - DEFAULT_REGION=ap-south-1
      - DATA_DIR=/tmp/localstack/data
    volumes:
      - localstack-data:/tmp/localstack

  # ─── MICROSERVICES ──────────────────────────────────────────────

  auth:
    build:
      context: ../dotlearn-auth
      dockerfile: Dockerfile
    ports:
      - "5001:5001"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Server=sqlserver-auth;Database=UserDb;User Id=sa;Password=DOTLearn@123;TrustServerCertificate=True
      - AWS__ServiceURL=http://localstack:4566
      - AWS__Region=ap-south-1
    depends_on:
      - sqlserver-auth
      - localstack

  assessment:
    build:
      context: ../dotlearn-assessment
      dockerfile: Dockerfile
    ports:
      - "5002:5002"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Server=sqlserver-assessment;Database=AssessmentDb;User Id=sa;Password=DOTLearn@123;TrustServerCertificate=True
      - AWS__ServiceURL=http://localstack:4566
      - AWS__Region=ap-south-1
    depends_on:
      - sqlserver-assessment
      - localstack

  course:
    build:
      context: ../dotlearn-course
      dockerfile: Dockerfile
    ports:
      - "5003:5003"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Server=sqlserver-course;Database=CourseDb;User Id=sa;Password=DOTLearn@123;TrustServerCertificate=True
      - AWS__ServiceURL=http://localstack:4566
      - AWS__Region=ap-south-1
    depends_on:
      - sqlserver-course
      - localstack

  enrollment:
    build:
      context: ../dotlearn-enrollment
      dockerfile: Dockerfile
    ports:
      - "5004:5004"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Server=sqlserver-enrollment;Database=EnrollmentDb;User Id=sa;Password=DOTLearn@123;TrustServerCertificate=True
      - AWS__ServiceURL=http://localstack:4566
      - AWS__Region=ap-south-1
    depends_on:
      - sqlserver-enrollment
      - localstack

  forum:
    build:
      context: ../dotlearn-forum
      dockerfile: Dockerfile
    ports:
      - "5005:5005"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Server=sqlserver-forum;Database=ForumDb;User Id=sa;Password=DOTLearn@123;TrustServerCertificate=True
      - AWS__ServiceURL=http://localstack:4566
      - AWS__Region=ap-south-1
    depends_on:
      - sqlserver-forum
      - localstack

  lesson:
    build:
      context: ../dotlearn-lesson
      dockerfile: Dockerfile
    ports:
      - "5006:5006"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Server=sqlserver-lesson;Database=ContentDb;User Id=sa;Password=DOTLearn@123;TrustServerCertificate=True
      - AWS__ServiceURL=http://localstack:4566
      - AWS__Region=ap-south-1
    depends_on:
      - sqlserver-lesson
      - localstack

  notification:
    build:
      context: ../dotlearn-notification
      dockerfile: Dockerfile
    ports:
      - "5007:5007"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Server=sqlserver-notification;Database=NotificationDb;User Id=sa;Password=DOTLearn@123;TrustServerCertificate=True
      - AWS__ServiceURL=http://localstack:4566
      - AWS__Region=ap-south-1
    depends_on:
      - sqlserver-notification
      - localstack

  payment:
    build:
      context: ../dotlearn-payment
      dockerfile: Dockerfile
    ports:
      - "5008:5008"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Server=sqlserver-payment;Database=PaymentDb;User Id=sa;Password=DOTLearn@123;TrustServerCertificate=True
      - AWS__ServiceURL=http://localstack:4566
      - AWS__Region=ap-south-1
    depends_on:
      - sqlserver-payment
      - localstack

  progress:
    build:
      context: ../dotlearn-progress
      dockerfile: Dockerfile
    ports:
      - "5009:5009"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Server=sqlserver-progress;Database=ProgressDb;User Id=sa;Password=DOTLearn@123;TrustServerCertificate=True
      - AWS__ServiceURL=http://localstack:4566
      - AWS__Region=ap-south-1
    depends_on:
      - sqlserver-progress
      - localstack

  # ─── FRONTEND ───────────────────────────────────────────────────

  frontend:
    build:
      context: ../dotlearn-frontend
      dockerfile: Dockerfile
    ports:
      - "4200:4200"
    volumes:
      - ../dotlearn-frontend:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
    depends_on:
      - auth
      - course

  # ─── NGINX REVERSE PROXY ────────────────────────────────────────

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - auth
      - assessment
      - course
      - enrollment
      - forum
      - lesson
      - notification
      - payment
      - progress

# ─── VOLUMES ──────────────────────────────────────────────────────

volumes:
  sqlserver-auth-data:
  sqlserver-course-data:
  sqlserver-lesson-data:
  sqlserver-enrollment-data:
  sqlserver-assessment-data:
  sqlserver-payment-data:
  sqlserver-progress-data:
  sqlserver-forum-data:
  sqlserver-notification-data:
  localstack-data: