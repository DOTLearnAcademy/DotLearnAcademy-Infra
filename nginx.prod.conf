events {
  worker_connections 1024;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;
  sendfile on;

  # Gzip compression
  gzip on;
  gzip_types text/plain text/css application/javascript application/json application/x-javascript text/xml application/xml application/xml+rss text/javascript;
  gzip_min_length 1024;

  # Shared proxy headers
  proxy_set_header Host $host;
  proxy_set_header X-Real-IP $remote_addr;
  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  proxy_set_header X-Forwarded-Proto $scheme;
  proxy_read_timeout 60s;
  proxy_connect_timeout 10s;

  # ── Upstream backends (port 80 — Kestrel default in containers) ──
  upstream auth_service         { server auth:80; }
  upstream course_service       { server course:80; }
  upstream lesson_service       { server lesson:80; }
  upstream enrollment_service   { server enrollment:80; }
  upstream payment_service      { server payment:80; }
  upstream assessment_service   { server assessment:80; }
  upstream progress_service     { server progress:80; }
  upstream forum_service        { server forum:80; }
  upstream notification_service { server notification:80; }

  server {
    listen 80;
    server_name _;

    # ── Auth Service ──────────────────────────────────────────────
    location /api/auth/ {
      proxy_pass http://auth_service/api/auth/;
    }

    # JWKS endpoint — required for JWT validation across services
    location /auth/.well-known/ {
      proxy_pass http://auth_service/auth/.well-known/;
    }

    # User profile endpoints
    location /api/users/ {
      proxy_pass http://auth_service/api/users/;
    }

    # ── Course Service ────────────────────────────────────────────
    location /api/courses/ {
      proxy_pass http://course_service/api/courses/;
    }

    location /internal/courses/ {
      proxy_pass http://course_service/internal/courses/;
    }

    # ── Lesson Service ────────────────────────────────────────────
    location /api/lessons/ {
      proxy_pass http://lesson_service/api/lessons/;
    }

    location /internal/lessons/ {
      proxy_pass http://lesson_service/internal/lessons/;
    }

    # ── Enrollment Service ────────────────────────────────────────
    location /api/enrollments/ {
      proxy_pass http://enrollment_service/api/enrollments/;
    }

    location /internal/enrollments/ {
      proxy_pass http://enrollment_service/internal/enrollments/;
    }

    # ── Payment Service ───────────────────────────────────────────
    location /api/payments/ {
      proxy_pass http://payment_service/api/payments/;
    }

    # ── Assessment + Quiz Attempts ────────────────────────────────
    location /api/quizzes/ {
      proxy_pass http://assessment_service/api/quizzes/;
    }

    location /api/attempts/ {
      proxy_pass http://assessment_service/api/attempts/;
    }

    # ── Progress + Certificates ───────────────────────────────────
    location /api/progress/ {
      proxy_pass http://progress_service/api/progress/;
    }

    location /api/certificates/ {
      proxy_pass http://progress_service/api/certificates/;
    }

    # ── Forum ─────────────────────────────────────────────────────
    location /api/forum/ {
      proxy_pass http://forum_service/api/forum/;
    }

    # ── Notifications ─────────────────────────────────────────────
    location /api/notifications/ {
      proxy_pass http://notification_service/api/notifications/;
    }

    # ── Health Checks ─────────────────────────────────────────────
    location /health/auth {
      proxy_pass http://auth_service/health;
    }

    location /health/course {
      proxy_pass http://course_service/health;
    }

    location /health/lesson {
      proxy_pass http://lesson_service/health;
    }

    location /health/enrollment {
      proxy_pass http://enrollment_service/health;
    }

    location /health/payment {
      proxy_pass http://payment_service/health;
    }

    location /health/assessment {
      proxy_pass http://assessment_service/health;
    }

    location /health/progress {
      proxy_pass http://progress_service/health;
    }

    location /health/forum {
      proxy_pass http://forum_service/health;
    }

    location /health/notification {
      proxy_pass http://notification_service/health;
    }

    # ── Angular SPA — MUST BE LAST ────────────────────────────────
    # try_files is critical: without it, refreshing /courses returns 404
    location / {
      root /usr/share/nginx/html;
      index index.html;
      try_files $uri $uri/ /index.html;
    }
  }
}
