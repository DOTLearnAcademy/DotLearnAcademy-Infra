events {
  worker_connections 1024;
}

http {

  upstream auth        { server auth:5001; }
  upstream assessment  { server assessment:5002; }
  upstream course      { server course:5003; }
  upstream enrollment  { server enrollment:5004; }
  upstream lesson      { server lesson:5006; }
  upstream payment     { server payment:5008; }
  upstream progress    { server progress:5009; }

  server {
    listen 80;

    # ─── AUTH ──────────────────────────────────────────────────
    # NOTE: No trailing slash on proxy_pass = Nginx preserves the
    # full incoming URI path (including /api/auth/ prefix).
    # ASP.NET controllers are decorated with [Route("api/auth")]
    # so the full path must reach the container unchanged.

    location /api/auth/ {
      proxy_pass http://auth;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    # ─── ADMIN ROUTES ───────────────────────────────────────────
    # /api/admin/users/* → Auth service (admin user management)
    location /api/admin/users/ {
      proxy_pass http://auth;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    # /api/admin/courses/* → Course service (admin approvals)
    location /api/admin/courses/ {
      proxy_pass http://course;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    # ─── SERVICE ROUTES ─────────────────────────────────────────

    location /api/assessment/ {
      proxy_pass http://assessment;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/courses/ {
      proxy_pass http://course;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/enrollments/ {
      proxy_pass http://enrollment;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }


    location /api/lessons/ {
      proxy_pass http://lesson;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }


    location /api/payments/ {
      proxy_pass http://payment;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/progress/ {
      proxy_pass http://progress;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    # ─── FRONTEND ───────────────────────────────────────────────

    location / {
      root /usr/share/nginx/html;
      try_files $uri $uri/ /index.html;
    }
  }
}