    image: 358454003819.dkr.ecr.ap-southeast-2.amazonaws.com/dotlearn-lesson:latest

    environment:
      <<: *common-env
      ConnectionStrings__DefaultConnection: "Server=dotlearn-db.c7ge68ueyfep.ap-southeast-2.rds.amazonaws.com,1433;Database=ContentDb;User Id=admin;Password=DOTLearn@123;TrustServerCertificate=True;ConnectionTimeout=30;"
      AllowedOrigins__Ec2: "http://3.27.174.183"
      AllowedOrigins__CloudFront: ""
    restart: no

  # ── Enrollment Service ────────────────────────────────────────────
